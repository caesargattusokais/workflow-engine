server:
  port: 8080

engine:
  base-url: http://localhost:8080

# LDAP — public test server (forumsys.com)
ldap:
  url: ldap://ldap.forumsys.com:389
  base: dc=example,dc=com
  user: cn=read-only-admin,dc=example,dc=com
  password: password
  userFilter: "(&(objectClass=inetOrgPerson)(uid={0}))"
  groupFilter: "(&(objectClass=groupOfUniqueNames)(uniqueMember={0}))"
  groupMemberAttr: uniqueMember
  uidAttr: uid
  userObjectClass: inetOrgPerson
  userBase: dc=example,dc=com

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/workflow_engine?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    serialization:
      write-dates-as-timestamps: false


---
spring:
  config:
    activate:
      on-profile: memory
